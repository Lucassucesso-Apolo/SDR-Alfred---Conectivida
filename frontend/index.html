<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alfred SDR Conectivida</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 20px; }
      code { background: #f5f5f5; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <h1>Alfred SDR Conectivida</h1>
    <div class="card">
      <p id="status">Verificando backend...</p>
      <p>Backend esperado em <code>http://localhost:3001</code>.</p>
    </div>

    <script>
      fetch('http://localhost:3001/api/message')
        .then((res) => res.json())
        .then((data) => {
          document.getElementById('status').textContent = data.message;
        })
        .catch(() => {
          document.getElementById('status').textContent =
            'Não foi possível conectar ao backend. Inicie o servidor Express na porta 3001.';
        });
    </script>
  </body>
</html>
